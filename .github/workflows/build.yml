name: Build restool package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Docker image
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/archlinux-aarch64.tar.zst
          key: archlinux-aarch64-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Build Arch Linux ARM Docker image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          curl -LO http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          cat <<'DOCKERFILE' > Dockerfile
          FROM scratch AS base
          ADD ArchLinuxARM-aarch64-latest.tar.gz /
          RUN pacman-key --init && pacman-key --populate archlinuxarm
          RUN sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf
          RUN pacman -Rdd --noconfirm $(pacman -Qq | grep '^linux') 2>/dev/null || true
          RUN pacman -Syu --noconfirm base-devel git
          RUN sed -i '0,/if (( EUID == 0 ))/s/if (( EUID == 0 ))/if false/' /usr/bin/makepkg
          RUN pacman -Scc --noconfirm && rm -rf /var/log/* /tmp/* /var/cache/pacman/pkg/*
          FROM scratch
          COPY --from=base / /
          DOCKERFILE
          docker build -t archlinux-aarch64 .
          docker images archlinux-aarch64
          docker save archlinux-aarch64 | zstd -T0 -o /tmp/archlinux-aarch64.tar.zst
          ls -lh /tmp/archlinux-aarch64.tar.zst

      - name: Load cached Docker image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: zstd -d /tmp/archlinux-aarch64.tar.zst --stdout | docker load

      - name: Build package
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/pkg" \
            archlinux-aarch64 \
            bash -c 'cd /pkg && makepkg -s --noconfirm'

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: restool-package
          path: "*.pkg.tar.*"

      - name: Create release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG=$(ls *.pkg.tar.* | head -1)
          eval "$(grep -E '^(pkgver|pkgrel)=' PKGBUILD)"
          TAG="${pkgver}-${pkgrel}"
          gh release create "$TAG" "$PKG" \
            --title "restool $TAG" \
            --notes "Automated build from commit ${{ github.sha }}"