name: Build restool package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker image
        uses: actions/cache@v4
        id: docker-cache
        with:
          path: /tmp/archlinux-arm.tar.gz
          key: archlinux-arm-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Build Arch Linux ARM Docker image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          curl -LO http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz
          cat <<'DOCKERFILE' > Dockerfile
          FROM scratch
          ADD ArchLinuxARM-aarch64-latest.tar.gz /
          RUN pacman-key --init && pacman-key --populate archlinuxarm
          RUN pacman -Syu --noconfirm base-devel git
          RUN sed -i '0,/if (( EUID == 0 ))/s/if (( EUID == 0 ))/if false/' /usr/bin/makepkg
          DOCKERFILE
          docker build -t archlinux-arm .
          docker save archlinux-arm | gzip > /tmp/archlinux-arm.tar.gz

      - name: Load cached Docker image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: gunzip -c /tmp/archlinux-arm.tar.gz | docker load

      - name: Build package
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/pkg" \
            archlinux-arm \
            bash -c 'cd /pkg && makepkg -s --noconfirm'

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: restool-package
          path: "*.pkg.tar.*"